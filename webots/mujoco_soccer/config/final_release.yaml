simulation:
  physics_hz: 200
  low_level_control_hz: 100
  agent_decision_hz: 20
  team_coordination_hz: 10
  default_duration_seconds: 60
  default_seed: 42

viewer:
  target_fps: 60
  width: 1280
  height: 720
  native_passive_viewer: true
  hide_left_ui: true
  hide_right_ui: true
  show_contact_debug: false
  show_joint_debug: false
  show_ghosts: false
  show_trails: false

motion:
  normal_speed_mps: 0.48
  chase_speed_mps: 0.62
  support_speed_mps: 0.52
  fine_approach_speed_mps: 0.16
  defensive_speed_mps: 0.34
  max_acceleration_mps2: 1.0
  max_deceleration_mps2: 1.4
  max_jerk_mps3: 4.0
  max_yaw_rate_deg_s: 85
  max_yaw_acceleration_deg_s2: 180

video:
  output_fps: 60
  width: 1280
  height: 720
  interpolation: true
  source: physical_trajectory_log
